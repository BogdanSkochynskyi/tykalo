spring:
  application:
    name: tykalo
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}
  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/tykalo}
    username: ${POSTGRES_USER:tykalo}
    password: ${POSTGRES_PASSWORD:tykalo}
  flyway:
    enabled: true
    locations: classpath:db/migration
  jpa:
    hibernate:
      ddl-auto: none
    open-in-view: false

telegram:
  bot:
    token: ${TELEGRAM_BOT_TOKEN:}
    polling:
      enabled: true

server:
  port: ${SERVER_PORT:8080}
  shutdown: graceful

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true
      show-details: when-authorized

logging:
  level:
    root: INFO
    io.tykalo: INFO
