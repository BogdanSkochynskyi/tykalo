spring:
  application:
    name: tykalo
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}

telegram:
  bot:
    token: ${TELEGRAM_BOT_TOKEN:}

server:
  port: ${SERVER_PORT:8080}
  shutdown: graceful

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true
      show-details: when-authorized

logging:
  level:
    root: INFO
    io.tykalo: INFO
